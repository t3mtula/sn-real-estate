<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon_light.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>SN Rental Studio</title>
    <meta name="title" content="SN Rental Studio" />
    <meta
      name="description"
      content="ระบบบริหารสัญญาเช่าอสังหาริมทรัพย์ของ SN"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sn-real-estate-v2.pages.dev" />
    <meta property="og:title" content="SN Rental Studio" />
    <meta
      property="og:description"
      content="ระบบบริหารสัญญาเช่าอสังหาริมทรัพย์ของ SN"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://sn-real-estate-v2.pages.dev" />
    <meta property="twitter:title" content="SN Rental Studio" />
    <meta
      property="twitter:description"
      content="ระบบบริหารสัญญาเช่าอสังหาริมทรัพย์ของ SN"
    />

    <!-- Screen UI font = IBM Plex Sans Thai (Thai) + IBM Plex Sans (Latin/numbers),
         see --font-sans in src/styles/index.css. Sarabun is kept loaded because
         print/PDF (contract-html, invoice-html, batch-receipt) and the doc-editor
         preview render with Sarabun for formal documents. Loaded here via <link>
         instead of CSS @import so it fetches in parallel with the JS bundle and
         does not block FCP. `display=swap` ensures fallback text renders immediately. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
    />

    <meta name="theme-color" content="#0F4C5C" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
