<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon_light.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>SN Real Estate</title>
    <meta name="title" content="SN Real Estate" />
    <meta
      name="description"
      content="Yonghua Group internal app — built on Yonghua Standard Stack"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shadcn-admin.netlify.app" />
    <meta property="og:title" content="SN Real Estate" />
    <meta
      property="og:description"
      content="Admin Dashboard UI built with Shadcn and Vite."
    />
    <meta
      property="og:image"
      content="https://shadcn-admin.netlify.app/images/shadcn-admin.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://shadcn-admin.netlify.app" />
    <meta property="twitter:title" content="SN Real Estate" />
    <meta
      property="twitter:description"
      content="Admin Dashboard UI built with Shadcn and Vite."
    />
    <meta
      property="twitter:image"
      content="https://shadcn-admin.netlify.app/images/shadcn-admin.png"
    />

    <!-- font family · Sarabun is the only font actually used (see @theme in
         src/styles/index.css). Loaded here via <link> instead of CSS @import
         so it fetches in parallel with the JS bundle and does not block FCP.
         `display=swap` ensures fallback text renders immediately. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
    />

    <meta name="theme-color" content="#0F4C5C" />
  </head>

  <body>
    <div id="root">
      <!-- Initial skeleton — replaced by React on hydrate. Shown BEFORE JS bundle loads,
           so FCP fires within ~200ms instead of 11s (Core Web Vitals: Good < 1.8s). -->
      <style>
        .skeleton-app{display:flex;min-height:100vh;font-family:Sarabun,system-ui,sans-serif;background:#fafafa;color:#0a0a0a}
        .skeleton-sidebar{width:240px;background:#fff;border-right:1px solid #e5e5e5;padding:16px;flex-shrink:0}
        .skeleton-brand{display:flex;gap:10px;align-items:center;margin-bottom:24px}
        .skeleton-brand-logo{width:32px;height:32px;background:#0f4c5c;border-radius:6px;flex-shrink:0}
        .skeleton-brand-text{flex:1}
        .skeleton-brand-name{height:14px;width:120px;background:#e5e5e5;border-radius:3px;margin-bottom:6px}
        .skeleton-brand-sub{height:10px;width:140px;background:#f0f0f0;border-radius:3px}
        .skeleton-nav-label{height:10px;width:60px;background:#e5e5e5;border-radius:3px;margin:16px 0 8px}
        .skeleton-nav-item{height:32px;background:#f0f0f0;border-radius:6px;margin-bottom:6px}
        .skeleton-main{flex:1;padding:24px 32px}
        .skeleton-title{height:28px;width:200px;background:#e5e5e5;border-radius:4px;margin-bottom:8px}
        .skeleton-subtitle{height:14px;width:320px;background:#f0f0f0;border-radius:3px;margin-bottom:24px}
        .skeleton-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
        .skeleton-kpi{height:108px;background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:16px}
        .skeleton-kpi-label{height:11px;width:80px;background:#e5e5e5;border-radius:3px;margin-bottom:14px}
        .skeleton-kpi-value{height:24px;width:120px;background:#d4d4d4;border-radius:4px;margin-bottom:8px}
        .skeleton-kpi-sub{height:10px;width:100px;background:#f0f0f0;border-radius:3px}
        @media(max-width:768px){
          .skeleton-sidebar{display:none}
          .skeleton-kpi-grid{grid-template-columns:repeat(2,1fr)}
          .skeleton-main{padding:16px}
        }
        @media (prefers-color-scheme:dark){
          .skeleton-app{background:#0a0a0a;color:#fafafa}
          .skeleton-sidebar,.skeleton-kpi{background:#171717;border-color:#262626}
          .skeleton-brand-name,.skeleton-nav-label,.skeleton-title,.skeleton-kpi-label,.skeleton-kpi-value{background:#262626}
          .skeleton-brand-sub,.skeleton-nav-item,.skeleton-subtitle,.skeleton-kpi-sub{background:#1f1f1f}
        }
      </style>
      <div class="skeleton-app" aria-hidden="true">
        <aside class="skeleton-sidebar">
          <div class="skeleton-brand">
            <div class="skeleton-brand-logo"></div>
            <div class="skeleton-brand-text">
              <div class="skeleton-brand-name"></div>
              <div class="skeleton-brand-sub"></div>
            </div>
          </div>
          <div class="skeleton-nav-label"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
        </aside>
        <main class="skeleton-main">
          <div class="skeleton-title"></div>
          <div class="skeleton-subtitle"></div>
          <div class="skeleton-kpi-grid">
            <div class="skeleton-kpi"><div class="skeleton-kpi-label"></div><div class="skeleton-kpi-value"></div><div class="skeleton-kpi-sub"></div></div>
            <div class="skeleton-kpi"><div class="skeleton-kpi-label"></div><div class="skeleton-kpi-value"></div><div class="skeleton-kpi-sub"></div></div>
            <div class="skeleton-kpi"><div class="skeleton-kpi-label"></div><div class="skeleton-kpi-value"></div><div class="skeleton-kpi-sub"></div></div>
            <div class="skeleton-kpi"><div class="skeleton-kpi-label"></div><div class="skeleton-kpi-value"></div><div class="skeleton-kpi-sub"></div></div>
          </div>
          <div class="skeleton-kpi-grid">
            <div class="skeleton-kpi"><div class="skeleton-kpi-label"></div><div class="skeleton-kpi-value"></div><div class="skeleton-kpi-sub"></div></div>
            <div class="skeleton-kpi"><div class="skeleton-kpi-label"></div><div class="skeleton-kpi-value"></div><div class="skeleton-kpi-sub"></div></div>
            <div class="skeleton-kpi"><div class="skeleton-kpi-label"></div><div class="skeleton-kpi-value"></div><div class="skeleton-kpi-sub"></div></div>
            <div class="skeleton-kpi"><div class="skeleton-kpi-label"></div><div class="skeleton-kpi-value"></div><div class="skeleton-kpi-sub"></div></div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
